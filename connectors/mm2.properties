# =====================================================================
# StreamFlow MirrorMaker 2 configuration
# Active-Passive replication: us-east (primary) -> us-west (secondary)
# =====================================================================

# Cluster aliases. These prefix replicated topic names on the target.
clusters = us-east, us-west

# Bootstrap servers per cluster.
# Note: MM2 runs INSIDE the docker network, so we use the internal
# hostnames and ports (19092), not the localhost-mapped ones.
us-east.bootstrap.servers = primary-broker-1:19092,primary-broker-2:19092,primary-broker-3:19092
us-west.bootstrap.servers = secondary-broker-1:19092,secondary-broker-2:19092,secondary-broker-3:19092

# Replication flow direction (one-way for active-passive)
us-east->us-west.enabled = true
us-east->us-west.topics = events|transactions|audit

# Reverse direction explicitly disabled
us-west->us-east.enabled = false

# Setting replication factor of newly created remote topics on target.
# Important: the secondary cluster has min.insync.replicas=2, so RF=1
# internal topics would break acks=all writes.
replication.factor = 3

# =====================================================================
# Replication tuning
# =====================================================================

# How often to check for new topics on the source. Default 600s.
# Lowered for development responsiveness.
refresh.topics.interval.seconds = 30

# How often to check for new consumer groups on the source.
refresh.groups.interval.seconds = 30

# How often to checkpoint consumer group offsets to the target.
emit.checkpoints.interval.seconds = 10

# How often to emit heartbeats. Heartbeats verify replication is alive.
emit.heartbeats.interval.seconds = 5

# Replication factor for MM2 internal topics on the target cluster.
checkpoints.topic.replication.factor = 3
heartbeats.topic.replication.factor = 3
offset-syncs.topic.replication.factor = 3

# Replication factor for Connect internal topics on the target cluster.
offset.storage.replication.factor = 3
status.storage.replication.factor = 3
config.storage.replication.factor = 3

# =====================================================================
# Source connector (replicates data)
# =====================================================================

# Number of tasks to parallelise replication across.
tasks.max = 4

# Sync topic configurations from source to target.
sync.topic.configs.enabled = true
sync.topic.acls.enabled = false

# =====================================================================
# Producer settings (for writing to target cluster)
# =====================================================================

us-west.producer.acks = all
us-west.producer.enable.idempotence = true
us-west.producer.compression.type = snappy
us-west.producer.batch.size = 32768
us-west.producer.linger.ms = 10
us-west.producer.max.in.flight.requests.per.connection = 5

# =====================================================================
# Consumer settings (for reading from source cluster)
# =====================================================================

us-east.consumer.auto.offset.reset = earliest
us-east.consumer.fetch.min.bytes = 1024
us-east.consumer.fetch.max.wait.ms = 500
